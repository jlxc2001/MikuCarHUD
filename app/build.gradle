plugins {
    id 'com.android.application'
}

android {
    namespace 'com.jlxc.mikucarhudreceiver'
    compileSdk 35

    defaultConfig {
        applicationId 'com.jlxc.mikucarhudreceiver'
        minSdk 23
        targetSdk 35
        versionCode 6
        versionName '0.6.0-user-font-embedded'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
