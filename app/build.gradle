plugins {
    id 'com.android.application'
}

android {
    namespace 'com.jlxc.mikucarhudreceiver'
    compileSdk 35

    defaultConfig {
        applicationId 'com.jlxc.mikucarhudreceiver'
        minSdk 23
        targetSdk 35
        versionCode 15
        versionName '0.15.0-vector-tach-labels-smaller-lower'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
